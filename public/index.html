<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chị Google AI - Fix CORS</title>
    <style>
        body { margin: 0; background: #0f1020; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); padding: 40px; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; width: 340px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        input { width: 90%; padding: 15px; margin: 20px 0; border-radius: 12px; border: 1px solid #333; background: #1a1b2e; color: #fff; text-align: center; font-size: 16px; outline: none; }
        button { background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; box-shadow: 0 5px 15px rgba(0,210,255,0.3); }
        #status { margin-top: 20px; color: #00ffcc; font-weight: bold; }
        #log { margin-top: 10px; font-size: 0.85em; color: #888; }
    </style>
</head>
<body>

<div class="card">
    <h2>CHỊ GOOGLE AI</h2>
    <input type="text" id="tiktokId" placeholder="Nhập ID TikTok...">
    <button onclick="startSystem()">KẾT NỐI LIVE</button>
    <div id="status">Chưa kết nối</div>
    <div id="log">Sẵn sàng...</div>
</div>

<audio id="googleAudio" style="display:none"></audio>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const audioPlayer = document.getElementById('googleAudio');
    let isActivated = false;

    function startSystem() {
        const id = document.getElementById('tiktokId').value;
        if(!id) return alert("Thiếu ID TikTok!");
        
        isActivated = true;
        socket.emit('set-id', id);
        document.getElementById('status').innerText = "Đang kết nối...";
        
        // Phát một tiếng "ting" nhẹ để trình duyệt cho phép âm thanh
        audioPlayer.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=";
        audioPlayer.play();
    }

    socket.on('status', msg => document.getElementById('status').innerText = msg);

    socket.on('speak', (data) => {
        if (!isActivated) return;
        document.getElementById('log').innerText = `Đang đọc: ${data.user}`;

        // Link Google TTS - Bỏ tham số crossOrigin để tránh lỗi bảo mật
        const text = data.text;
        const googleUrl = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=vi&client=tw-ob`;
        
        audioPlayer.src = googleUrl;
        audioPlayer.play().catch(error => {
            console.error("Vẫn lỗi:", error);
            document.getElementById('log').innerText = "Lỗi âm thanh, thử click vào màn hình!";
        });
    });
</script>
</body>
</html>
