<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHI GOOGLE AI - DASHBOARD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --neon-blue: #00d2ff;
        }

        body {
            background: #0f172a;
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            height: 100%;
        }

        .scroll-area {
            height: calc(100vh - 100px);
            overflow-y: auto;
        }

        .chat-item {
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid var(--neon-blue);
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 4px;
        }

        .status-online { color: #10b981; font-size: 0.9rem; }
        
        /* Custom Range Slider */
        .form-range::-webkit-slider-runnable-track { background: #334155; height: 6px; border-radius: 3px; }
        .form-range::-webkit-slider-thumb { background: var(--neon-blue); margin-top: -5px; }
    </style>
</head>
<body>

<div class="container-fluid h-100 p-3">
    <div class="row h-100">
        <div class="col-md-4">
            <div class="glass-panel">
                <h5 class="mb-4 text-primary">KẾT NỐI TIKTOK</h5>
                <div class="mb-3">
                    <input type="text" id="tiktokUser" class="form-control bg-dark text-white border-secondary" placeholder="Nhập ID TikTok...">
                    <button onclick="connectTikTok()" class="btn btn-primary w-100 mt-2">KẾT NỐI & BẬT LOA</button>
                    <div id="status" class="status-online mt-2">Đang chờ kết nối...</div>
                </div>

                <hr class="border-secondary">

                <h5 class="mb-3 text-info">CẤU HÌNH GIỌNG NÓI</h5>
                <div class="mb-4">
                    <label class="form-label d-flex justify-content-between">
                        Tốc độ: <span id="speedLabel" class="badge bg-info">1.0x</span>
                    </label>
                    <input type="range" id="speedRange" min="0.5" max="2.0" step="0.1" value="1.0" class="form-range">
                </div>

                <h5 class="text-warning">DẠY AI XƯNG HÔ</h5>
                <textarea id="promptInput" class="form-control bg-dark text-white border-secondary mb-2" rows="5"></textarea>
                <button onclick="savePrompt()" class="btn btn-outline-warning w-100 btn-sm">LƯU CẤU HÌNH</button>
            </div>
        </div>

        <div class="col-md-8">
            <div class="glass-panel">
                <h5 class="mb-3 border-bottom border-secondary pb-2">LỊCH SỬ TRÒ CHUYỆN</h5>
                <div id="chatHistory" class="scroll-area">
                    </div>
            </div>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const chatHistory = document.getElementById('chatHistory');
    const speedRange = document.getElementById('speedRange');
    const speedLabel = document.getElementById('speedLabel');

    // Xử lý tốc độ giọng nói
    speedRange.addEventListener('input', () => {
        const speed = speedRange.value;
        speedLabel.innerText = speed + 'x';
        socket.emit('change-speed', parseFloat(speed));
    });

    function connectTikTok() {
        const user = document.getElementById('tiktokUser').value;
        if(user) socket.emit('set-username', user);
    }

    function savePrompt() {
        const prompt = document.getElementById('promptInput').value;
        // Logic gửi prompt lên database thông qua API của bạn
        alert("Đã gửi yêu cầu lưu cấu hình!");
    }

    // Nhận dữ liệu audio và phát
    socket.on('audio-data', (data) => {
        // Hiển thị lên màn hình
        const item = document.createElement('div');
        item.className = 'chat-item';
        item.innerHTML = `
            <div class="text-info small">👤 ${data.user}</div>
            <div class="mb-1">💬 ${data.comment}</div>
            <div class="text-warning">🤖 Mina: ${data.reply}</div>
        `;
        chatHistory.prepend(item);

        // Phát âm thanh với tốc độ đã chọn
        const audio = new Audio(data.audio);
        audio.playbackRate = data.speed || 1.0;
        audio.play().catch(e => console.log("Lỗi phát âm thanh:", e));
    });

    socket.on('status', (msg) => {
        document.getElementById('status').innerText = msg;
    });
</script>

</body>
</html>
