<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>CHỊ GOOGLE AI - LUXURY</title>
    <style>
        body { margin: 0; background: #0f1020; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); padding: 40px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; width: 340px; }
        input { width: 90%; padding: 15px; margin: 20px 0; border-radius: 12px; border: 1px solid #333; background: #1a1b2e; color: #fff; text-align: center; outline: none; }
        button { background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; }
        #status { margin-top: 20px; color: #00ffcc; font-weight: bold; }
        #log-box { margin-top: 15px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; font-size: 0.85em; max-height: 100px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="card">
    <h2>CHỊ GOOGLE AI</h2>
    <input type="text" id="tiktokId" placeholder="Nhập ID TikTok...">
    <button onclick="start()">KẾT NỐI & MỞ LOA</button>
    <div id="status">Sẵn sàng kết nối...</div>
    <div id="log-box">Lịch sử trả lời sẽ hiện ở đây...</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let queue = [], isPlaying = false;

    function start() {
        const id = document.getElementById('tiktokId').value;
        if(!id) return alert("Chưa nhập ID!");
        socket.emit('set-username', id);
        // Mẹo mở khóa âm thanh trình duyệt
        new Audio().play().catch(() => {});
    }

    socket.on('status', m => document.getElementById('status').innerText = m);

    socket.on('audio-data', (data) => {
        const log = document.getElementById('log-box');
        log.innerHTML = `<div><b>${data.user}:</b> ${data.reply}</div>` + log.innerHTML;

        if (data.audio) {
            queue.push(data.audio); // Đưa vào hàng đợi giống code Bèo
            if (!isPlaying) playNext();
        }
    });

    function playNext() {
        if (queue.length === 0) { isPlaying = false; return; }
        isPlaying = true;
        
        const audio = new Audio(queue.shift()); // Lấy dữ liệu Base64 phát luôn
        audio.onended = () => setTimeout(playNext, 500); 
        audio.play().catch(() => playNext());
    }
</script>
</body>
</html>
