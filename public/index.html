<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chị Google AI - Siêu Cấp Fix</title>
    <style>
        body { margin: 0; background: #0b0e14; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: #161b22; padding: 40px; border-radius: 20px; text-align: center; width: 350px; border: 1px solid #30363d; }
        input { width: 90%; padding: 12px; margin: 20px 0; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; text-align: center; }
        button { background: #238636; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
        #status { margin-top: 20px; font-weight: bold; font-size: 0.9em; }
        #log { margin-top: 10px; color: #8b949e; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="card">
    <h2>CHỊ GOOGLE AI</h2>
    <input type="text" id="tiktokId" placeholder="Nhập ID TikTok...">
    <button onclick="activate()">KẾT NỐI & BẬT LOA</button>
    <div id="status">Sẵn sàng</div>
    <div id="log">Nhấn nút để bắt đầu</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let canSpeak = false;

    function activate() {
        canSpeak = true;
        const id = document.getElementById('tiktokId').value;
        socket.emit('set-id', id);
        document.getElementById('status').innerText = "Đang thử kết nối...";
        
        // Kích hoạt loa
        const audio = new Audio("https://www.soundjay.com/button/beep-07.wav");
        audio.play().catch(() => {});
    }

    socket.on('status', msg => {
        document.getElementById('status').innerText = msg;
        if(msg.includes("Lỗi")) {
            document.getElementById('status').style.color = "red";
        } else {
            document.getElementById('status').style.color = "#00ffcc";
        }
    });

    socket.on('speak', (data) => {
        if (!canSpeak) return;
        document.getElementById('log').innerText = `Đọc: ${data.text}`;

        // SỬ DỤNG API VOICERSS (MIỄN PHÍ - KHÔNG CORS)
        const voiceUrl = `https://api.voicerss.org/?key=69837a7f6f1c4e7f9f3f3f3f3f3f3f3f&hl=vi-vn&src=${encodeURIComponent(data.text)}&f=48khz_16bit_stereo`;
        
        // Nếu không muốn dùng Key, ta dùng link dự phòng ổn định nhất của Google qua Proxy khác
        const proxyGoogle = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(data.text)}&tl=vi&client=tw-ob`;
        
        const audio = new Audio(proxyGoogle);
        audio.play().catch(e => {
            console.log("Cần click vào trang web để nghe");
        });
    });
</script>
</body>
</html>
