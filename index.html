<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BÈO LIVE - DASHBOARD</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --main: #ff85a2; --main-dark: #fe2c55; --bg: #fff0f3; --panel: rgba(255, 255, 255, 0.9); --text: #4a1c2c; }
        body { font-family: 'Quicksand', sans-serif; background: linear-gradient(135deg, #fce4ec 0%, #ffc1e3 100%); margin: 0; padding: 15px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        .header-panel { background: var(--panel); padding: 15px; border-radius: 20px; box-shadow: 0 8px 25px rgba(254, 44, 85, 0.1); margin-bottom: 15px; border: 1px solid #fff; }
        .conn-row { display: flex; gap: 10px; margin-bottom: 10px; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #ffdae0; outline: none; }
        button.start-btn { background: var(--main-dark); color: white; border: none; padding: 0 20px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 8px; }
        .setting-row { display: flex; align-items: center; justify-content: space-between; background: #fff; padding: 8px 12px; border-radius: 12px; font-size: 13px; font-weight: 600; border: 1px solid #ffe4e9; }
        
        .speed-box { background: #fff; padding: 10px; border-radius: 12px; border: 1px solid #ffdae0; margin-top: 10px; display: flex; align-items: center; gap: 10px; }
        input[type="range"] { flex: 1; accent-color: var(--main-dark); cursor: pointer; }

        .chat-container { flex: 1; background: var(--panel); border-radius: 25px; padding: 20px; display: flex; flex-direction: column; overflow: hidden; border: 2px solid #fff; }
        #chat { flex: 1; overflow-y: auto; display: flex; flex-direction: column-reverse; }
        .msg { padding: 10px; border-bottom: 1px solid rgba(254, 44, 85, 0.05); font-size: 16px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Switch UI */
        .switch { position: relative; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ddd; border-radius: 20px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background: var(--main-dark); }
        input:checked + .slider:before { transform: translateX(16px); }
        
        .admin-link { text-align: center; margin-top: 10px; font-size: 12px; }
        .admin-link a { color: var(--main-dark); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header-panel">
        <div class="conn-row">
            <input type="text" id="user" placeholder="Nhập ID TikTok...">
            <button class="start-btn" onclick="start()">KẾT NỐI</button>
        </div>
        
        <div class="controls">
            <div class="setting-row" style="background:#ffebee;"><span>CHỈ PK:</span><label class="switch"><input type="checkbox" id="pkOnlyToggle"><span class="slider"></span></label></div>
            <div class="setting-row"><span>Chào:</span><label class="switch"><input type="checkbox" id="welcomeToggle" checked><span class="slider"></span></label></div>
            <div class="setting-row"><span>Quà:</span><label class="switch"><input type="checkbox" id="giftToggle" checked><span class="slider"></span></label></div>
            <div class="setting-row"><span>Trợ lý:</span><label class="switch"><input type="checkbox" id="botToggle" checked><span class="slider"></span></label></div>
            <div class="setting-row"><span>Nhắc PK:</span><label class="switch"><input type="checkbox" id="pkToggle" checked><span class="slider"></span></label></div>
        </div>

        <div class="speed-box">
            <span style="font-size: 11px; font-weight: bold;">TỐC ĐỘ ĐỌC:</span>
            <input type="range" id="speechSpeed" min="0.5" max="2" step="0.1" value="1">
            <span id="speedVal" style="font-size: 11px; width: 25px;">1.0x</span>
        </div>
        <div class="admin-link"><a href="/admin" target="_blank">⚙️ MỞ TRANG CÀI ĐẶT (TỪ CẤM, ICON, VIẾT TẮT)</a></div>
    </div>

    <div class="chat-container">
        <div id="chat"></div>
    </div>

    <script>
        const socket = io();
        let queue = [], playing = false;

        document.getElementById('speechSpeed').oninput = function() {
            document.getElementById('speedVal').innerText = this.value + 'x';
        };

        function start() { 
            const user = document.getElementById('user').value;
            if(user) socket.emit('set-username', user); 
        }

        socket.on('status', m => alert(m));

        socket.on('audio-data', d => {
            const chat = document.getElementById('chat');
            const div = document.createElement('div'); div.className = 'msg';
            div.innerHTML = `<b style="color:#fe2c55">${d.user}:</b> ${d.comment}`;
            chat.prepend(div);

            if (d.audio) {
                const isPkOnly = document.getElementById('pkOnlyToggle').checked;
                if (isPkOnly) {
                    if (d.type === 'pk' && document.getElementById('pkToggle').checked) queue.push(d.audio);
                } else {
                    if (d.type === 'welcome' && !document.getElementById('welcomeToggle').checked) return;
                    if (d.type === 'gift' && !document.getElementById('giftToggle').checked) return;
                    if (d.type === 'pk' && !document.getElementById('pkToggle').checked) return;
                    if (d.type === 'bot' && !document.getElementById('botToggle').checked) return;
                    queue.push(d.audio);
                }
                if (!playing) play();
            }
        });

        function play() {
            if (!queue.length) { playing = false; return; }
            playing = true;
            const a = new Audio(queue.shift());
            // ÁP DỤNG TỐC ĐỘ ĐỌC TỪ THANH TRƯỢT
            a.playbackRate = parseFloat(document.getElementById('speechSpeed').value);
            a.onended = () => setTimeout(play, 300);
            a.play().catch(() => play());
        }
    </script>
</body>
</html>
